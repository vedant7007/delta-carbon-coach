name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AI_DISABLED: '1'
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-project
      NEXT_PUBLIC_FIREBASE_APP_ID: ci-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests (coverage gated)
        run: npm run test:coverage

      - name: Security audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  e2e:
    name: E2E (AI-disabled degradation path)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    # No Firebase config on purpose: this exercises demo mode + the AI-disabled
    # degradation path (in-memory store, deterministic fallbacks). Setting
    # NEXT_PUBLIC_FIREBASE_* here would disable demo mode and hide the demo entry.
    env:
      AI_DISABLED: '1'
      DELTA_E2E: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
